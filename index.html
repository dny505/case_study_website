<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Shopping</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
}

header {
    background: #333;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
}

.product {
    background: white;
    margin: 15px;
    padding: 15px;
    width: 200px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

.product img {
    width: 100%;
    height: 150px;
}

button {
    background: green;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
}

button:hover {
    background: darkgreen;
}

.cart {
    background: white;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <h1>🛍 Online Shopping Store</h1>
</header>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Mobile</h3>
        <p>₹15000</p>
        <button onclick="addToCart('Mobile',15000)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Headphones</h3>
        <p>₹2000</p>
        <button onclick="addToCart('Headphones',2000)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/150">
        <h3>Shoes</h3>
        <p>₹3000</p>
        <button onclick="addToCart('Shoes',3000)">Add to Cart</button>
    </div>

</div>

<div class="cart">
    <h2>🛒 Cart</h2>
    <ul id="cartItems"></ul>
    <h3>Total: ₹<span id="total">0</span></h3>
</div>

<script>
let total = 0;

function addToCart(product, price) {
    let cart = document.getElementById("cartItems");

    let li = document.createElement("li");
    li.innerText = product + " - ₹" + price;
    cart.appendChild(li);

    total += price;
    document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
